name: nn4psych
channels:
  - conda-forge
dependencies:
  # Core Python — match actinf_physics (3.10) for shared env on cluster
  # Pre-built numpy wheels available for 3.10, avoids source-build issues
  - python=3.10.*

  # Scientific Computing
  - numpy>=1.24
  - scipy>=1.10
  - pandas>=2.0

  # Visualization (Agg backend only on cluster)
  - matplotlib>=3.7
  - seaborn>=0.12

  # Machine Learning
  # NOTE: PyTorch CPU installed via conda. For GPU, run:
  #   bash cluster/setup_env.sh --gpu
  # which pip-installs torch with bundled CUDA runtime.
  - pytorch>=2.0
  - scikit-learn>=1.2

  # Statistics
  - statsmodels>=0.14

  # Development
  - pytest>=7.0
  - pyyaml>=6.0
  - tqdm>=4.60

  # Utilities
  - pip
  - psutil

  - pip:
    - gymnasium>=0.29.0
    # NOTE: neurogym installed separately via setup_env.sh with --no-deps
    # to avoid it forcing a numpy source rebuild (Intel compiler conflict on M3)
    # Phase 4 Bayesian: NumPyro NUTS + JAX (CPU-only on cluster).
    # jaxlib is the C++/XLA backend; must match jax version.  Pinned ranges
    # rather than == so conda-forge resolves a compatible triple.
    - jax>=0.4.20,<0.5
    - jaxlib>=0.4.20,<0.5
    - numpyro>=0.13
    - arviz>=0.16
